<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Roster Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#152029; --paper:#f6f5f1; --panel:#ffffff; --line:#d9d5c9;
    --slate:#2c3e46; --teal:#3c6e64; --clay:#a8542f;
    --amber:#c68a1f; --amber-bg:#fbf1de;
    --red:#a33b2c; --red-bg:#faeae6;
    --green:#3c6e46; --green-bg:#eaf3ea;
    --muted:#6b6355;
    --mono:'IBM Plex Mono',monospace; --display:'Space Grotesk',sans-serif; --body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--body);}
  .shell{max-width:1180px;margin:0 auto;padding:28px 24px 80px;}

  header.top{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid var(--ink);padding-bottom:18px;margin-bottom:24px;flex-wrap:wrap;gap:16px;}
  .brand-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);margin:0 0 6px;}
  h1{font-family:var(--display);font-size:30px;margin:0;font-weight:700;letter-spacing:-.01em;}
  .top-meta{font-family:var(--mono);font-size:12px;color:var(--muted);text-align:right;line-height:1.6;}
  .top-meta b{color:var(--ink);}

  .upload-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;background:var(--slate);color:#fff;border-radius:10px;padding:16px 18px;margin-bottom:28px;}
  .upload-row label{font-size:13px;font-family:var(--mono);opacity:.85;}
  .upload-row input[type=text]{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);border-radius:6px;color:#fff;padding:8px 10px;font-family:var(--body);font-size:13px;min-width:160px;}
  .upload-row input[type=text]::placeholder{color:rgba(255,255,255,.55);}
  .file-btn{position:relative;overflow:hidden;background:#fff;color:var(--slate);border:none;border-radius:6px;padding:9px 16px;font-weight:600;font-size:13px;cursor:pointer;font-family:var(--body);}
  .file-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;}
  .upload-status{font-family:var(--mono);font-size:12px;color:#cfe0da;margin-left:auto;}
  .upload-status.err{color:#ffb4a3;}

  .grid2{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;margin-bottom:20px;}
  @media (max-width:860px){.grid2{grid-template-columns:1fr;}}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px 20px;margin-bottom:20px;}
  .panel h2{font-family:var(--display);font-size:15px;text-transform:uppercase;letter-spacing:.05em;margin:0 0 14px;display:flex;align-items:center;gap:8px;}
  .count-badge{font-family:var(--mono);font-size:11px;background:var(--ink);color:#fff;border-radius:20px;padding:2px 8px;}

  .alert-item{border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:13px;line-height:1.45;border-left:4px solid;}
  .alert-item.critical{background:var(--red-bg);border-color:var(--red);color:#5e2318;}
  .alert-item.warning{background:var(--amber-bg);border-color:var(--amber);color:#5b430f;}
  .alert-item .tag{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:2px;opacity:.75;}
  .empty-note{color:var(--muted);font-size:13px;font-style:italic;}

  .change-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .change-list{list-style:none;margin:0;padding:0;}
  .change-list li{font-size:13px;padding:7px 0;border-bottom:1px dashed var(--line);display:flex;justify-content:space-between;gap:8px;}
  .change-list li:last-child{border-bottom:none;}
  .name{font-weight:600;}
  .sub{color:var(--muted);font-size:11px;font-family:var(--mono);white-space:nowrap;}
  .col-added h3{color:var(--green);}
  .col-removed h3{color:var(--red);}
  .change-cols h3{font-size:12px;text-transform:uppercase;letter-spacing:.05em;margin:0 0 8px;font-family:var(--mono);}
  .side-box{margin-top:12px;padding-top:12px;border-top:1px solid var(--line);}
  .side-box h3{font-size:12px;text-transform:uppercase;letter-spacing:.05em;margin:0 0 8px;font-family:var(--mono);color:var(--clay);}

  .tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
  .tab-btn{font-family:var(--mono);font-size:12px;padding:7px 12px;border-radius:6px;border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--muted);}
  .tab-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}

  .loc-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-bottom:18px;}
  .loc-head h2{font-family:var(--display);font-size:20px;margin:0;}
  .loc-head .sub-line{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:4px;}

  .settings-box{display:flex;gap:14px;align-items:flex-end;background:#f1efe7;border:1px solid var(--line);border-radius:8px;padding:10px 14px;flex-wrap:wrap;}
  .settings-box label{font-family:var(--mono);font-size:11px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:3px;}
  .settings-box input{width:70px;padding:6px 8px;border:1px solid var(--line);border-radius:5px;font-family:var(--body);font-size:13px;}
  .settings-box .field{display:flex;flex-direction:column;}
  .settings-box .ratio-prefix{font-family:var(--mono);font-size:12px;color:var(--muted);margin-right:2px;}
  .settings-box .save-btn{background:var(--teal);color:#fff;border:none;border-radius:5px;padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer;}
  .settings-box .save-note{font-family:var(--mono);font-size:11px;color:var(--teal);}

  table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:8px;}
  caption{text-align:left;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:6px;caption-side:top;}
  th{background:#eeeae0;text-align:left;padding:7px 9px;font-weight:600;border:1px solid var(--line);font-size:11.5px;}
  td{padding:7px 9px;border:1px solid var(--line);}
  tr.leave td{background:var(--amber-bg);}
  .status-pill{font-family:var(--mono);font-size:10.5px;padding:2px 7px;border-radius:20px;display:inline-block;}
  .status-pill.active{background:var(--green-bg);color:var(--green);}
  .status-pill.leave{background:var(--amber-bg);color:#8a6414;}
  .dept-summary{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
  .dept-chip{font-family:var(--mono);font-size:11px;background:#eeeae0;border-radius:20px;padding:4px 10px;color:var(--slate);}

  .role-group{margin-bottom:14px;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .role-group-head{background:#eeeae0;padding:8px 12px;font-family:var(--mono);font-size:12px;font-weight:600;display:flex;justify-content:space-between;}
  .role-group-body{padding:6px 12px;}
  .role-group-body .person{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px dashed var(--line);font-size:13px;}
  .role-group-body .person:last-child{border-bottom:none;}

  .hiring-table td, .hiring-table th{text-align:center;padding:6px 5px;font-size:12px;}
  .hiring-table td:first-child, .hiring-table th:first-child{text-align:left;}
  .hiring-table input{width:44px;padding:3px 4px;font-size:12px;border:1px solid var(--line);border-radius:4px;text-align:center;}
  .hiring-table tr.actual-row td{font-weight:600;color:var(--teal);}
  .hiring-table tr.total-row td{background:#f1efe7;font-weight:700;}

  .history{margin-top:28px;}
  .history-item{border-left:3px solid var(--line);padding:6px 0 6px 12px;margin-bottom:10px;font-size:13px;}
  .history-item .when{font-family:var(--mono);font-size:11px;color:var(--muted);}

  footer.note{margin-top:40px;font-size:12px;color:var(--muted);font-family:var(--mono);}
</style>
</head>
<body>
<div class="shell">

  <header class="top">
    <div>
      <p class="brand-eyebrow">Workforce &middot; Live Roster</p>
      <h1>Roster Tracker</h1>
    </div>
    <div class="top-meta" id="topMeta">No data yet — upload a roster to get started.</div>
  </header>

  <div class="upload-row">
    <label for="uploaderName">Uploaded by</label>
    <input type="text" id="uploaderName" placeholder="Your name" />
    <label class="file-btn">Choose Employee Basic export (.xlsx)
      <input type="file" id="fileInput" accept=".xlsx,.xls" />
    </label>
    <span class="upload-status" id="uploadStatus"></span>
  </div>

  <div class="grid2">
    <div class="panel" id="alertsPanel">
      <h2>Ratio &amp; Census Alerts <span class="count-badge" id="alertCount">0</span></h2>
      <div id="alertsBody"><p class="empty-note">No data yet.</p></div>
    </div>

    <div class="panel" id="changesPanel">
      <h2>Changes — Most Recent Upload</h2>
      <div id="changesBody"><p class="empty-note">Upload a roster to see who's new or departed.</p></div>
    </div>
  </div>

  <div class="panel">
    <h2>Tracker View</h2>
    <div class="tabs" id="tabBar"></div>
    <div id="locationBody"><p class="empty-note">No locations loaded yet.</p></div>
  </div>

  <div class="history">
    <h2 style="font-family:var(--display);font-size:15px;text-transform:uppercase;letter-spacing:.05em;">Upload History</h2>
    <div id="historyBody"><p class="empty-note">No uploads yet.</p></div>
  </div>

  <footer class="note">roster-tracker · Netlify Functions + Blobs · client-side parsing, nothing leaves your Netlify site</footer>
</div>

<script>
const API = "/api/roster";
const SETTINGS_API = "/api/settings";
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
let state = { snapshot: { locations: [] }, history: [], alerts: [], settings: {}, hiring: {}, hiringYear: new Date().getFullYear() };
let activeLocation = null;

// ---------- Excel parsing: Employee Basic export (flat table) ----------
const HEADER_MAP = {
  "first name": "firstName",
  "last name": "lastName",
  "employee status description": "status",
  "position job title": "position",
  "employment type description": "employmentType",
  "hire date": "hireDate",
  "company name": "company",
  "location description": "location",
  "department description": "department",
};

function normalizeHeader(h){ return String(h || "").trim().toLowerCase(); }

function parseWorkbook(wb){
  let rows = null;
  for (const sheetName of wb.SheetNames){
    const ws = wb.Sheets[sheetName];
    const asObjects = XLSX.utils.sheet_to_json(ws, { defval: null, raw: true });
    if (asObjects.length) {
      const headers = Object.keys(asObjects[0]).map(normalizeHeader);
      const hasCore = ["first name", "last name", "location description"].every(h => headers.includes(h));
      if (hasCore) { rows = asObjects; break; }
    }
  }
  if (!rows) throw new Error("Couldn't find First Name / Last Name / Location Description columns in this file.");

  const byLocation = new Map();
  for (const raw of rows){
    const rec = {};
    for (const [key, val] of Object.entries(raw)){
      const mapped = HEADER_MAP[normalizeHeader(key)];
      if (mapped) rec[mapped] = val;
    }
    if (!rec.firstName && !rec.lastName) continue;
    const location = (rec.location || "Unassigned").toString().trim();
    let hireDate = rec.hireDate;
    if (hireDate instanceof Date) hireDate = hireDate.toISOString().slice(0, 10);
    else if (hireDate) hireDate = String(hireDate);

    const employee = {
      firstName: (rec.firstName || "").toString().trim(),
      lastName: (rec.lastName || "").toString().trim(),
      status: (rec.status || "").toString().trim(),
      position: (rec.position || "").toString().trim(),
      employmentType: (rec.employmentType || "").toString().trim(),
      hireDate: hireDate || "",
      company: (rec.company || "").toString().trim(),
      department: (rec.department || "").toString().trim(),
    };

    if (!byLocation.has(location)) byLocation.set(location, []);
    byLocation.get(location).push(employee);
  }

  return [...byLocation.entries()].map(([location, employees]) => ({ location, employees }));
}

// ---------- API ----------
async function loadState(){
  const res = await fetch(API);
  const data = await res.json();
  state = data;
  activeLocation = state.snapshot.locations[0]?.location || null;
  render();
}

async function uploadLocations(locations, uploadedBy){
  const res = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ locations, uploadedBy }),
  });
  if (!res.ok) throw new Error("Upload failed (" + res.status + ")");
  return res.json();
}

async function saveSettings(location, census, ratio, plannedHiring){
  const res = await fetch(SETTINGS_API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ location, census, ratio, plannedHiring }),
  });
  if (!res.ok) throw new Error("Couldn't save settings (" + res.status + ")");
  return res.json();
}

// ---------- Rendering ----------
function fmtTime(iso){
  if (!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleString(undefined, { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
}

function render(){
  const { snapshot, history, alerts } = state;
  const locations = snapshot.locations || [];

  document.getElementById("topMeta").innerHTML = snapshot.updatedAt
    ? `Last updated <b>${fmtTime(snapshot.updatedAt)}</b> by <b>${snapshot.uploadedBy || "Unknown"}</b> &middot; ${locations.length} locations`
    : "No data yet — upload a roster to get started.";

  renderAlerts(alerts || []);
  renderChanges(history && history[0]);
  renderTabs(locations);
  renderLocation(locations);
  renderHistory(history || []);
}

function renderAlerts(alerts){
  document.getElementById("alertCount").textContent = alerts.length;
  const body = document.getElementById("alertsBody");
  if (!alerts.length){
    body.innerHTML = '<p class="empty-note">No ratio or census alerts right now. Set census + ratio on a location tab below to enable these.</p>';
    return;
  }
  body.innerHTML = alerts.map(a => `
    <div class="alert-item ${a.level}">
      <span class="tag">${a.location} &middot; ${a.role}</span>
      ${a.message}
    </div>
  `).join("");
}

function renderChanges(latest){
  const body = document.getElementById("changesBody");
  if (!latest){
    body.innerHTML = '<p class="empty-note">Upload a roster to see who\\'s new or departed.</p>';
    return;
  }
  const added = latest.added || [], removed = latest.removed || [];
  const moved = latest.moved || [], statusChanges = latest.statusChanges || [];
  const list = (items) => items.length
    ? `<ul class="change-list">${items.map(i => `<li><span class="name">${i.firstName} ${i.lastName}</span><span class="sub">${i.location} &middot; ${i.position || ""}</span></li>`).join("")}</ul>`
    : '<p class="empty-note">None</p>';

  let html = `
    <div class="change-cols">
      <div class="col-added"><h3>New (${added.length})</h3>${list(added)}</div>
      <div class="col-removed"><h3>Departed (${removed.length})</h3>${list(removed)}</div>
    </div>
  `;
  if (moved.length){
    html += `<div class="side-box"><h3>Moved locations (${moved.length})</h3>
      <ul class="change-list">${moved.map(m => `<li><span class="name">${m.name}</span><span class="sub">${m.from} &rarr; ${m.to}</span></li>`).join("")}</ul>
    </div>`;
  }
  if (statusChanges.length){
    html += `<div class="side-box"><h3>Status changes (${statusChanges.length})</h3>
      <ul class="change-list">${statusChanges.map(m => `<li><span class="name">${m.name}</span><span class="sub">${m.from} &rarr; ${m.to}</span></li>`).join("")}</ul>
    </div>`;
  }
  body.innerHTML = html;
}

function renderTabs(locations){
  const bar = document.getElementById("tabBar");
  if (!locations.length){ bar.innerHTML = ""; return; }
  if (!activeLocation) activeLocation = locations[0].location;
  bar.innerHTML = locations.map(l =>
    `<button class="tab-btn ${l.location === activeLocation ? "active" : ""}" data-loc="${l.location}">${l.location}</button>`
  ).join("");
  bar.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => { activeLocation = btn.dataset.loc; render(); });
  });
}

function renderLocation(locations){
  const body = document.getElementById("locationBody");
  const loc = locations.find(l => l.location === activeLocation);
  if (!loc){ body.innerHTML = '<p class="empty-note">No locations loaded yet.</p>'; return; }

  const cfg = (state.settings || {})[loc.location] || {};
  const planned = cfg.plannedHiring && cfg.plannedHiring.length === 12 ? cfg.plannedHiring : Array(12).fill(0);
  const hiring = (state.hiring || {})[loc.location] || { total: Array(12).fill(0) };
  const employees = [...(loc.employees || [])];
  const activeCount = employees.filter(e => e.status === "Active").length;
  const leaveCount = employees.filter(e => e.status === "Leave of Absence").length;

  const deptCounts = {};
  employees.forEach(e => { if (e.status === "Active") deptCounts[e.department || "Other"] = (deptCounts[e.department || "Other"] || 0) + 1; });
  const chips = Object.entries(deptCounts).map(([d, n]) => `<span class="dept-chip">${d}: ${n}</span>`).join("");

  const admin = employees.filter(e => e.department === "Administrative");
  const adminRows = admin.map(e => `
    <tr class="${e.status === "Leave of Absence" ? "leave" : ""}">
      <td>${e.position}</td><td>${e.firstName} ${e.lastName}</td>
      <td><span class="status-pill ${e.status === "Active" ? "active" : "leave"}">${e.status}</span></td>
    </tr>`).join("") || `<tr><td colspan="3" class="empty-note">No administrative staff listed.</td></tr>`;

  const clinical = employees.filter(e => e.department !== "Administrative" && e.employmentType !== "As Needed");
  const byRole = new Map();
  clinical.forEach(e => {
    const key = e.position || "Unspecified role";
    if (!byRole.has(key)) byRole.set(key, []);
    byRole.get(key).push(e);
  });
  const roleGroupsHtml = [...byRole.entries()].map(([role, people]) => {
    const activeN = people.filter(p => p.status === "Active").length;
    const rows = people.map(p => `
      <div class="person">
        <span>${p.firstName} ${p.lastName}${p.status === "Leave of Absence" ? ' <span class="status-pill leave">Leave</span>' : ""}</span>
        <span class="sub">${p.employmentType}</span>
      </div>`).join("");
    return `<div class="role-group">
      <div class="role-group-head"><span>${role}</span><span>${activeN} active / ${people.length} total</span></div>
      <div class="role-group-body">${rows}</div>
    </div>`;
  }).join("") || '<p class="empty-note">No clinical/role-based staff listed.</p>';

  const prn = employees.filter(e => e.employmentType === "As Needed");
  const prnRows = prn.map(e => `
    <tr class="${e.status === "Leave of Absence" ? "leave" : ""}">
      <td>${e.position}</td><td>${e.firstName} ${e.lastName}</td>
      <td><span class="status-pill ${e.status === "Active" ? "active" : "leave"}">${e.status}</span></td>
    </tr>`).join("") || `<tr><td colspan="3" class="empty-note">No PRN / As Needed staff listed.</td></tr>`;

  const hiringHead = `<tr><th></th>${MONTHS.map(m => `<th>${m}</th>`).join("")}<th>Total</th></tr>`;
  const plannedRow = `<tr><td>Planned</td>${planned.map((v, i) => `<td><input type="number" min="0" class="planned-input" data-idx="${i}" value="${v}" /></td>`).join("")}<td>${planned.reduce((a,b)=>a+Number(b||0),0)}</td></tr>`;
  const actualRow = `<tr class="actual-row"><td>Actual (${state.hiringYear})</td>${hiring.total.map(v => `<td>${v}</td>`).join("")}<td>${hiring.total.reduce((a,b)=>a+b,0)}</td></tr>`;

  body.innerHTML = `
    <div class="loc-head">
      <div>
        <h2>${loc.location}</h2>
        <div class="sub-line">${activeCount} active &middot; ${leaveCount} on leave &middot; ${employees.length} total</div>
      </div>
      <div class="settings-box">
        <div class="field"><label>Current census</label><input type="number" id="censusInput" value="${cfg.census ?? ""}" placeholder="e.g. 42" /></div>
        <div class="field"><label>Ratio (1:x)</label>
          <div style="display:flex;align-items:center;"><span class="ratio-prefix">1:</span><input type="number" id="ratioInput" value="${cfg.ratio ?? ""}" placeholder="10" /></div>
        </div>
        <button class="save-btn" id="saveSettingsBtn">Save</button>
        <span class="save-note" id="settingsSaveNote"></span>
      </div>
    </div>

    <div class="dept-summary">${chips || '<span class="empty-note">No active staff yet</span>'}</div>

    <table>
      <caption>Administrative Roles</caption>
      <thead><tr><th>Role</th><th>Name</th><th>Status</th></tr></thead>
      <tbody>${adminRows}</tbody>
    </table>

    <h3 style="font-family:var(--mono);font-size:12px;text-transform:uppercase;color:var(--muted);margin:18px 0 8px;">Clinical Staff by Role</h3>
    ${roleGroupsHtml}

    <table style="margin-top:16px;">
      <caption>PRN / As Needed Staff</caption>
      <thead><tr><th>Role</th><th>Name</th><th>Status</th></tr></thead>
      <tbody>${prnRows}</tbody>
    </table>

    <table class="hiring-table" style="margin-top:16px;">
      <caption>Hiring — Planned vs. Actual (${state.hiringYear})</caption>
      <thead>${hiringHead}</thead>
      <tbody>${plannedRow}${actualRow}</tbody>
    </table>
    <div style="text-align:right;"><button class="save-btn" id="savePlannedBtn">Save planned hiring</button> <span class="save-note" id="plannedSaveNote"></span></div>
  `;

  document.getElementById("saveSettingsBtn").addEventListener("click", async () => {
    const census = document.getElementById("censusInput").value;
    const ratio = document.getElementById("ratioInput").value;
    const note = document.getElementById("settingsSaveNote");
    note.textContent = "Saving…";
    try {
      await saveSettings(loc.location, census, ratio, undefined);
      await loadState();
      note.textContent = "Saved";
    } catch (err) {
      note.textContent = "Error saving";
      console.error(err);
    }
  });

  document.getElementById("savePlannedBtn").addEventListener("click", async () => {
    const inputs = [...document.querySelectorAll(".planned-input")];
    const newPlanned = Array(12).fill(0);
    inputs.forEach(inp => { newPlanned[Number(inp.dataset.idx)] = Number(inp.value) || 0; });
    const note = document.getElementById("plannedSaveNote");
    note.textContent = "Saving…";
    try {
      await saveSettings(loc.location, undefined, undefined, newPlanned);
      await loadState();
      note.textContent = "Saved";
    } catch (err) {
      note.textContent = "Error saving";
      console.error(err);
    }
  });
}

function renderHistory(history){
  const body = document.getElementById("historyBody");
  if (!history.length){ body.innerHTML = '<p class="empty-note">No uploads yet.</p>'; return; }
  body.innerHTML = history.slice(0, 15).map(h => `
    <div class="history-item">
      <div class="when">${fmtTime(h.at)} &middot; ${h.uploadedBy}</div>
      +${h.added.length} new / &minus;${h.removed.length} departed${h.moved.length ? " / " + h.moved.length + " moved" : ""}${(h.statusChanges || []).length ? " / " + h.statusChanges.length + " status change(s)" : ""}
    </div>
  `).join("");
}

// ---------- Wire up upload ----------
document.getElementById("fileInput").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const statusEl = document.getElementById("uploadStatus");
  const uploadedBy = document.getElementById("uploaderName").value.trim() || "Unknown";
  statusEl.classList.remove("err");
  statusEl.textContent = "Reading file…";
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: "array", cellDates: true });
    const locations = parseWorkbook(wb);
    if (!locations.length) throw new Error("No employee rows found in this file.");
    statusEl.textContent = "Comparing to last roster…";
    const result = await uploadLocations(locations, uploadedBy);
    state = result;
    activeLocation = state.snapshot.locations[0]?.location || null;
    render();
    statusEl.textContent = "Updated " + fmtTime(state.snapshot.updatedAt);
  } catch (err) {
    console.error(err);
    statusEl.classList.add("err");
    statusEl.textContent = "Error: " + err.message;
  } finally {
    e.target.value = "";
  }
});

loadState().catch(err => {
  document.getElementById("topMeta").textContent = "Couldn't reach the tracker backend yet.";
  console.error(err);
});
</script>
</body>
</html>
